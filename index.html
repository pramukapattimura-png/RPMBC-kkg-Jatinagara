
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator RPMBC - KKG JATINAGARA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/png" href="https://i.imgur.com/jVhaHGc.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .gradient-bg {
            background: radial-gradient(circle, #f0fdf4 0%, #dcfce7 50%, #bbf7d0 100%);
        }
        .green-primary {
            background-color: #064e3b;
        }
        .green-gradient {
            background: linear-gradient(to right, #064e3b, #4ade80, #064e3b);
        }
        @media print {
            .no-print { display: none !important; }
            .print-page { padding: 0 !important; margin: 0 !important; }
            .page-break { page-break-after: always; }
        }
        /* Custom Table Styles for Lampiran */
        .prose-slate table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
            margin-bottom: 1rem;
            font-size: 0.875rem;
        }
        .prose-slate th, .prose-slate td {
            border: 1px solid #cbd5e1;
            padding: 0.5rem;
            text-align: left;
        }
        .prose-slate th {
            background-color: #f1f5f9;
            font-weight: 600;
        }
        .prose-slate ol {
            list-style-type: decimal;
            margin-left: 1.5rem;
            margin-top: 0.5rem;
            margin-bottom: 0.5rem;
        }
        .prose-slate ul {
            list-style-type: disc;
            margin-left: 1.5rem;
            margin-top: 0.5rem;
            margin-bottom: 0.5rem;
        }
        .prose-slate li {
            margin-bottom: 0.25rem;
        }
    </style>
    <link rel="stylesheet" href="/index.css">
</head>
<body class="bg-slate-50 min-h-screen">
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
